<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>modern · text scope</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{max-width:1000px;width:100%;background:white;border-radius:2rem;box-shadow:0 20px 40px -10px rgba(0,20,30,0.15),0 8px 20px rgba(0,0,0,0.05);padding:2rem}

h1{font-size:1.8rem;font-weight:600;color:#0a1e2f;margin-bottom:.3rem}
.sub{color:#3f5569;margin-bottom:1.5rem}

.toggle-panel{display:flex;gap:1.5rem;margin-bottom:1rem}
.toggle-item{display:flex;gap:.5rem;align-items:center;font-size:.9rem}

textarea{width:100%;height:180px;padding:1rem;border-radius:20px;border:2px solid #dde7f0;margin-bottom:1.5rem}

.count-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#f2f7fc;padding:1rem;border-radius:1rem;text-align:center}

.section{background:#f9fdff;border-radius:1.5rem;padding:1.2rem;border:1px solid #cee2ef;margin-top:1.5rem}

/* density */
.density-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.density-char{min-width:24px;text-align:center;background:#e3eff9;border-radius:6px}
.density-bar{flex:1;height:10px;background:#e5edf5;border-radius:20px;overflow:hidden}
.density-fill{height:100%;background:#5d95bb}
.density-count{min-width:30px;text-align:right;font-size:.8rem}

/* index */
.index-chunk{margin-bottom:.6rem; margin-bottom: 1rem;}
.index-row{display:flex;gap:.35rem}
.index-cell{min-width:28px;text-align:center;font-size:.7rem;color:#4a6a80}
.char-cell{min-width:28px;text-align:center;font-size:.9rem;background:#e8f1f8;border-radius:6px;padding:.2rem 0}

</style>
</head>

<body>
<div class="card">
<h1>txtscope</h1>
<div class="sub">character & sentence analysis · with density + index</div>

<textarea id="textInput">Hello world! This is a modern text analyzer.</textarea>

<div class="toggle-panel">
  <div class="toggle-item"><label><input type="checkbox" id="toggleSpaces" checked> count spaces</label></div>
  <div class="toggle-item"><label><input type="checkbox" id="toggleSpecial" checked> count special chars</label></div>
</div>

<div class="count-grid">
<div class="stat-card"><div id="charCount">0</div><div>characters</div></div>
<div class="stat-card"><div id="wordCount">0</div><div>words</div></div>
<div class="stat-card"><div id="sentenceCount">0</div><div>sentences</div></div>
<div class="stat-card"><div id="paragraphCount">0</div><div>paragraphs</div></div>
</div>

<!-- DENSITY -->
<div style="display:flex;gap:1rem;align-items:center;margin-bottom:.5rem;font-size:.9rem;color:#2f4d6e">
  <label><input type="checkbox" id="caseSensitiveToggle"> case-sensitive</label>
</div>
<div class="section">
<h3 style="margin-bottom:.6rem">📊 character density</h3>
<div id="densityContainer"></div>
</div>

<!-- INDEX -->
<div class="section">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
<h3>🔢 string index</h3>
<label><input type="checkbox" id="indexBaseToggle"> 1-based</label>
</div>
<div id="indexContainer"></div>
</div>

</div>

<script>
const textarea=document.getElementById('textInput');
const toggleSpaces=document.getElementById('toggleSpaces');
const toggleSpecial=document.getElementById('toggleSpecial');

const charSpan=document.getElementById('charCount');
const wordSpan=document.getElementById('wordCount');
const sentenceSpan=document.getElementById('sentenceCount');
const paraSpan=document.getElementById('paragraphCount');

const densityContainer=document.getElementById('densityContainer');
const caseSensitiveToggle=document.getElementById('caseSensitiveToggle');
const indexContainer=document.getElementById('indexContainer');
const indexBaseToggle=document.getElementById('indexBaseToggle');

function refreshAll(){
const raw=textarea.value;

// character logic
let chars=0;
for(let ch of raw){
const isSpace=/\s/.test(ch);
const isSpecial=/[^a-zA-Z0-9\s]/.test(ch);

if(!toggleSpaces.checked && isSpace) continue;
if(!toggleSpecial.checked && isSpecial) continue;
chars++;
}

charSpan.innerText=chars;
wordSpan.innerText=raw.split(/\s+/).filter(Boolean).length;
sentenceSpan.innerText=(raw.match(/[.!?]+/g)||[]).length;
paraSpan.innerText=raw.trim()?raw.split(/\n+/).length:0;

renderDensity(raw);
renderIndex(raw);
}

function renderDensity(text){
  const caseSensitive = caseSensitiveToggle.checked;
  if(!caseSensitive) text = text.toLowerCase();
if(!text){densityContainer.innerHTML='type something';return}

const map={};
for(let ch of text){
if(ch==='\n'||ch==='\t') continue;
map[ch]=(map[ch]||0)+1;
}

const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
const max=sorted[0][1];

let html='';
for(let [char,count] of sorted.slice(0,20)){
const width=(count/max)*100;
html+=`<div class="density-row">
<span class="density-char">${char===' '?'␣':char}</span>
<div class="density-bar"><div class="density-fill" style="width:${width}%"></div></div>
<span class="density-count">${count}</span>
</div>`;
}

densityContainer.innerHTML=html;
}

function renderIndex(text){
if(!text){indexContainer.innerHTML='<div style="color:#628698">type something...</div>';return}

const oneBased=indexBaseToggle.checked;
const chunkSize=20;
let html='';

for(let start=0;start<text.length;start+=chunkSize){
const slice=text.slice(start,start+chunkSize);
let indexRow='<div class="index-row">';
let charRow='<div class="index-row">';

for(let i=0;i<slice.length;i++){
const idx=start+i;
let ch=slice[i];
if(ch===' ') ch='&nbsp;';
else if(ch==='\n') ch='↵';

indexRow+=`<div class="index-cell">${oneBased?idx+1:idx}</div>`;
charRow+=`<div class="char-cell">${ch}</div>`;
}

html+=`<div class="index-chunk">${indexRow}</div><div class="index-chunk">${charRow}</div>`;
}

indexContainer.innerHTML=html;
}

textarea.addEventListener('input',refreshAll);
caseSensitiveToggle.addEventListener('change',refreshAll);
toggleSpaces.addEventListener('change',refreshAll);
toggleSpecial.addEventListener('change',refreshAll);
indexBaseToggle.addEventListener('change',refreshAll);

refreshAll();
</script>

</body>
</html>
